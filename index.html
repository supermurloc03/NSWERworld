<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NSWER WORLD - Fanpage NMIXX</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDFKC1MS8PccR6335d_9KMg7WcMOQyY",
            authDomain: "chat-news.firebaseapp.com",
            databaseURL: "https://chat-nswer-default-rtdb.firebaseio.com/",
            projectId: "chat-news",
            storageBucket: "chat-news.firebasestorage.app",
            messagingSenderId: "267108137321",
            appId: "1:267108137321:web:c884165584762703bc65f8",
            measurementId: "G-2B1RXHCBXH"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #050a1a);
            color: #f0f0f0;
            min-height: 100vh;
            padding-top: 70px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .main-content {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Barra navegación - logo más pequeño y sin solapamiento */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 15, 42, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid #ff7eb3;
            padding: 6px 25px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-img {
            width: 24px;    /* Más pequeño para que no se tape */
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff7eb3, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active, .nav-btn:hover {
            background: #7c3aed;
            color: white;
            box-shadow: 0 0 6px #a855f7;
        }

        /* Perfil (sin nivel) */
        .profile-area {
            background: rgba(30, 27, 75, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 8px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(255,126,179,0.5);
        }
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }
        .bias-fixed {
            background: #2d2a55;
            padding: 4px 14px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            font-size: 0.85rem;
        }
        .level-area {
            background: rgba(30, 27, 75, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 10px 22px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #ffb347;
        }
        .level-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .level-badge {
            background: linear-gradient(135deg, #ffb347, #ff7e05);
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e1a2f;
            font-size: 0.85rem;
        }
        .points {
            background: #2a2a5a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        /* Secciones */
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .section.active-section {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Hero - logo central más grande */
        .hero {
            text-align: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px 20px;
            margin-bottom: 30px;
        }
        .hero-logo {
            max-width: 320px;   /* Aumentado a 320px */
            width: 85%;
            margin: 0 auto 20px;
            display: block;
            border-radius: 30px;
        }
        .hero p {
            font-size: 1.1rem;
            margin-top: 5px;
        }
        .member-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .member-card {
            background: rgba(20,25,55,0.6);
            border-radius: 28px;
            padding: 12px;
            width: 110px;
            text-align: center;
            transition: transform 0.2s;
        }
        .member-card:hover {
            transform: translateY(-8px);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #1e1a2f;
            margin: 0 auto 8px;
            border: 3px solid #ffb347;
        }
        .member-name {
            font-weight: bold;
            color: #ffb3e0;
            font-size: 0.9rem;
        }
        .news-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .news-card, .curiosities-card {
            background: rgba(20, 25, 55, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
        }
        .news-item, .curio-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .date {
            font-size: 0.7rem;
            color: #9ca3ff;
        }
        .chat-container {
            background: rgba(20, 25, 55, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
        }
        .chat-messages {
            background: #0a0c1a;
            border-radius: 24px;
            height: 420px;
            overflow-y: auto;
            padding: 15px;
        }
        .message {
            background: #1f2348;
            border-radius: 20px;
            padding: 10px 15px;
            margin-bottom: 12px;
            max-width: 80%;
        }
        .message.own {
            background: #3b2b6e;
            margin-left: auto;
        }
        .msg-header {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            margin-bottom: 5px;
            flex-wrap: wrap;
            align-items: baseline;
        }
        .bias-icon {
            background: #ffb3c6;
            color: #1a0f2a;
            padding: 2px 8px;
            border-radius: 40px;
        }
        .username {
            font-weight: bold;
        }
        .level-tag {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 5px;
        }
        .chat-input {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            border: none;
            background: #141829;
            color: white;
        }
        .chat-input button {
            background: #7c3aed;
            padding: 0 20px;
            border-radius: 60px;
            border: none;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 750px) {
            .navbar { flex-direction: column; gap: 6px; padding: 6px 15px; }
            .member-card { width: 95px; }
            .avatar { width: 65px; height: 65px; font-size: 1.8rem; }
            .news-grid { grid-template-columns: 1fr; }
            .hero-logo { max-width: 250px; }
            body { padding-top: 90px; }
        }
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .welcome-card {
            background: linear-gradient(145deg, #1e1b4b, #0f0c2c);
            border-radius: 40px;
            padding: 35px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #ff7eb3;
        }
        .bias-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }
        .bias-option {
            background: #2d2a55;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 60px;
            cursor: pointer;
        }
        .bias-option.selected {
            background: #ff7eb3;
            color: #1e1a2f;
        }
        .enter-btn {
            background: #7c3aed;
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffb3e0;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            background: #141829;
            color: white;
        }
    </style>
</head>
<body>

<!-- MODAL BIENVENIDA -->
<div id="welcomeModal" class="welcome-modal">
    <div class="welcome-card">
        <h2>✨ NSWER WORLD ✨</h2>
        <p>Completa tu perfil para entrar</p>
        <div class="input-group">
            <label>🎤 Tu nombre de NSWER:</label>
            <input type="text" id="newUsername" placeholder="Ej: NSWER_Lover" maxlength="20">
        </div>
        <div class="input-group">
            <label>💖 Elige a tu bias (fijo por ahora):</label>
            <div id="biasSelection" class="bias-buttons"></div>
        </div>
        <button id="enterButton" class="enter-btn">🌟 Entrar 🌟</button>
    </div>
</div>

<div id="mainContent" class="main-content" style="display: none;">
    <div class="navbar">
        <div class="logo-area">
            <img class="logo-img" src="https://raw.githubusercontent.com/supermurloc03/NSWERworld/main/img/Logo.png" alt="Logo NSWER" onerror="this.src='https://via.placeholder.com/24?text=N'">
            <span class="logo-text">NSWER WORLD</span>
        </div>
        <div class="nav-links">
            <button class="nav-btn active" data-section="home">🏠 Inicio</button>
            <button class="nav-btn" data-section="news">📢 Novedades</button>
            <button class="nav-btn" data-section="chat">💬 Chat</button>
        </div>
    </div>

    <div class="profile-area">
        <div class="user-info">
            <div>👤 <span id="usernameDisplay">Fan</span></div>
        </div>
        <div class="bias-fixed">
            <span>🎀 Mi bias:</span>
            <span id="biasFixedDisplay">Lily</span>
        </div>
    </div>

    <div id="homeSection" class="section active-section">
        <div class="level-area">
            <div class="level-stats">
                <div class="level-badge" id="levelDisplay">Nivel 1</div>
                <div class="points" id="pointsDisplay">⭐ 0 XP</div>
            </div>
        </div>
        <div class="hero">
            <img class="hero-logo" src="https://raw.githubusercontent.com/supermurloc03/NSWERworld/main/img/Logo.png" alt="NSWER WORLD Logo" onerror="this.src='https://via.placeholder.com/320?text=NSWER'">
            <p>💙 La comunidad definitiva para los fans de NMIXX 💗💜</p>
        </div>
        <div class="member-grid" id="memberGrid"></div>
        <div style="text-align:center; margin-top:30px;">
            <p>🌸 Bienvenido, <strong id="homeUsername">NSWER</strong>! 🌸</p>
            <p>Comparte tu amor por NMIXX, gana experiencia y sube de nivel.</p>
        </div>
    </div>

    <div id="newsSection" class="section">
        <div class="news-grid">
            <div class="news-card"><h3>📰 Últimas noticias</h3><div id="newsContainer"></div></div>
            <div class="curiosities-card"><h3>🤯 Curiosidades</h3><div id="curiositiesContainer"></div></div>
        </div>
    </div>

    <div id="chatSection" class="section">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Escribe algo... +1 XP">
                <button id="sendBtn">Enviar ✨</button>
            </div>
        </div>
    </div>
</div>

<script>
    const novedades = [
        { fecha: "19 Mayo 2026", texto: "¡Nuevo comeback 'Fe3O4: STICK OUT' anunciado para junio!" },
        { fecha: "15 Mayo 2026", texto: "NMIXX gana 'Mejor Performance' en K-Vibe Awards." },
        { fecha: "10 Mayo 2026", texto: "Lily y Haewon harán un live especial este viernes." }
    ];
    const curiosidadesList = [
        "Lily tiene nacionalidad australiana y coreana.",
        "Haewon fue aprendiz por 7 años.",
        "Sullyoon fue modelo infantil.",
        "BAE toca la batería.",
        "Jiwoo es la más joven.",
        "Kyujin imita a todos.",
        "Fandom: NSWER (Answer)."
    ];
    const members = ["Lily", "Haewon", "Sullyoon", "BAE", "Jiwoo", "Kyujin"];
    const levelThresholds = [0, 100, 300, 600, 1000];
    let currentUser = { username: "", xp: 0, level: 1, bias: "Lily" };

    const biasColors = {
        "Lily": "#D95B7A",
        "Haewon": "#E6A157",
        "Sullyoon": "#4CAF7A",
        "BAE": "#8A6ED1",
        "Jiwoo": "#D9A83C",
        "Kyujin": "#4A9ED9"
    };
    const avatarColors = {
        "Lily": "#FFB7C5",
        "Haewon": "#FFD8B7",
        "Sullyoon": "#B7F0C4",
        "BAE": "#C5B9FF",
        "Jiwoo": "#FFF2B7",
        "Kyujin": "#B7E4FF"
    };

    function saveUserData() { localStorage.setItem("nmixx_fan_user", JSON.stringify(currentUser)); }
    function updateUI() {
        document.getElementById("usernameDisplay").innerText = currentUser.username;
        document.getElementById("levelDisplay").innerHTML = `🏆 Nivel ${currentUser.level}`;
        document.getElementById("pointsDisplay").innerHTML = `⭐ ${currentUser.xp} XP`;
        document.getElementById("biasFixedDisplay").innerText = currentUser.bias;
        document.getElementById("homeUsername").innerText = currentUser.username;
        const biasFixedSpan = document.getElementById("biasFixedDisplay");
        if (biasFixedSpan) biasFixedSpan.style.color = biasColors[currentUser.bias] || "#ffb3e0";
    }
    function recalcLevel() {
        let newLevel = 1;
        for (let i=levelThresholds.length-1; i>=0; i--) {
            if (currentUser.xp >= levelThresholds[i]) { newLevel = i+1; break; }
        }
        if (newLevel !== currentUser.level) {
            currentUser.level = newLevel;
            alert(`🎉 ¡Felicidades! Has subido al NIVEL ${currentUser.level}`);
            saveUserData(); updateUI();
        }
        saveUserData();
    }
    function addXP(p=1) { currentUser.xp += p; recalcLevel(); updateUI(); saveUserData(); }

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;
        database.ref('chatMessages').push({
            username: currentUser.username,
            text: text,
            bias: currentUser.bias,
            level: currentUser.level,
            timestamp: Date.now()
        });
        input.value = "";
        addXP(1);
    }
    function loadMessages() {
        database.ref('chatMessages').on('value', snapshot => {
            const data = snapshot.val();
            const messages = data ? Object.values(data) : [];
            messages.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
            const container = document.getElementById("chatMessages");
            container.innerHTML = "";
            if (messages.length === 0) {
                container.innerHTML = '<div class="message">¡Escribe el primer mensaje!</div>';
                return;
            }
            messages.forEach(msg => {
                const isOwn = msg.username === currentUser.username;
                const div = document.createElement("div");
                div.className = `message ${isOwn ? 'own' : ''}`;
                const usernameColor = biasColors[msg.bias] || "#ffb3e0";
                const levelTag = msg.level ? `<span class="level-tag">⚡ Nvl ${msg.level}</span>` : '';
                div.innerHTML = `
                    <div class="msg-header">
                        <span class="bias-icon">✨ ${escapeHtml(msg.bias || "NMIXX")}</span>
                        <span class="username" style="color: ${usernameColor};">${escapeHtml(msg.username)}</span>
                        ${levelTag}
                    </div>
                    <div>${escapeHtml(msg.text)}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    function loadNewsAndCuriosities() {
        const newsDiv = document.getElementById("newsContainer");
        newsDiv.innerHTML = "";
        novedades.forEach(n => newsDiv.innerHTML += `<div class="news-item"><span class="date">📅 ${n.fecha}</span><br>${escapeHtml(n.texto)}</div>`);
        const curioDiv = document.getElementById("curiositiesContainer");
        curioDiv.innerHTML = "";
        [...curiosidadesList].sort(()=>0.5-Math.random()).slice(0,5).forEach(c => curioDiv.innerHTML += `<div class="curio-item">🔮 ${escapeHtml(c)}</div>`);
    }

    function generateMemberCards() {
        const container = document.getElementById("memberGrid");
        container.innerHTML = "";
        members.forEach(member => {
            const card = document.createElement("div");
            card.className = "member-card";
            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.style.backgroundColor = avatarColors[member];
            avatar.innerText = member.charAt(0);
            const nameSpan = document.createElement("div");
            nameSpan.className = "member-name";
            nameSpan.innerText = member;
            card.appendChild(avatar);
            card.appendChild(nameSpan);
            container.appendChild(card);
        });
    }

    function initNavigation() {
        const btns = document.querySelectorAll('.nav-btn');
        const sections = {
            home: document.getElementById('homeSection'),
            news: document.getElementById('newsSection'),
            chat: document.getElementById('chatSection')
        };
        btns.forEach(btn => btn.addEventListener('click', () => {
            const sec = btn.dataset.section;
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.values(sections).forEach(s => s.classList.remove('active-section'));
            if (sec === 'home') sections.home.classList.add('active-section');
            if (sec === 'news') sections.news.classList.add('active-section');
            if (sec === 'chat') sections.chat.classList.add('active-section');
        }));
    }

    function showWelcomeModal() {
        document.getElementById("welcomeModal").style.display = "flex";
        document.getElementById("mainContent").style.display = "none";
        const container = document.getElementById("biasSelection");
        container.innerHTML = "";
        members.forEach(m => {
            const btn = document.createElement("button");
            btn.innerText = m;
            btn.classList.add("bias-option");
            btn.onclick = () => {
                document.querySelectorAll(".bias-option").forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
                currentUser.bias = m;
            };
            container.appendChild(btn);
        });
        document.querySelector(".bias-option")?.classList.add("selected");
        currentUser.bias = members[0];
    }

    function finalizeWelcome() {
        const username = document.getElementById("newUsername").value.trim();
        if (!username || username.length<3) { alert("Nombre válido (mínimo 3 caracteres)"); return; }
        currentUser.username = username;
        currentUser.xp = 0; currentUser.level = 1;
        saveUserData();
        document.getElementById("welcomeModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        updateUI();
        generateMemberCards();
        loadMessages();
        loadNewsAndCuriosities();
        document.getElementById("sendBtn").onclick = sendMessage;
        document.getElementById("messageInput").onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };
        initNavigation();
    }

    function init() {
        const saved = localStorage.getItem("nmixx_fan_user");
        if (saved) {
            try { currentUser = JSON.parse(saved); } catch(e) {}
            document.getElementById("welcomeModal").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            updateUI();
            generateMemberCards();
            loadMessages();
            loadNewsAndCuriosities();
            document.getElementById("sendBtn").onclick = sendMessage;
            document.getElementById("messageInput").onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };
            initNavigation();
        } else { showWelcomeModal(); }
        document.getElementById("enterButton").onclick = finalizeWelcome;
    }
    init();
</script>
</body>
</html>
